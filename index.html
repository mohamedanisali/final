<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دفعة 2026 — اللوحة الملكية</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg: #050508;
      --gold: #c9a84c;
      --gold-dark: #8a6d1d;
      --white: #f5f0e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background-color: var(--bg); 
      color: var(--white); 
      font-family: 'Tajawal', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header { padding: 60px 20px; text-align: center; width: 100%; }
    header h1 { font-family: 'Amiri', serif; font-size: 3.5rem; color: var(--gold); margin-bottom: 10px; }
    header p { opacity: 0.7; letter-spacing: 2px; }

    /* ── Input Section ── */
    .input-container { width: 90%; max-width: 500px; margin-bottom: 50px; }
    .glass-card { 
      background: rgba(255,255,255,0.03); 
      padding: 30px; 
      border-radius: 20px; 
      border: 1px solid rgba(255,255,255,0.1); 
      backdrop-filter: blur(10px); 
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    
    .label-text { display: block; margin-bottom: 10px; color: var(--gold); font-weight: bold; }
    input[type="text"] { 
      width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(201,168,76,0.3); 
      background: rgba(0,0,0,0.5); color: white; margin-bottom: 25px; font-size: 1rem;
    }
    
    .btn-gold { 
      background: linear-gradient(135deg, var(--gold-dark), var(--gold)); 
      color: black; padding: 16px; border-radius: 50px; font-weight: bold; 
      border: none; width: 100%; cursor: pointer; transition: 0.3s; font-size: 1.1rem;
    }
    .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(201,168,76,0.3); }

    /* ── THE FRAME MASTERPIECE ── */
    #celebration-section { display: none; width: 100%; max-width: 600px; text-align: center; padding-bottom: 100px; }

    .frame-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1; /* الفريم مربع */
      margin: 0 auto 40px;
      overflow: hidden;
      background: #fff;
    }

    /* صورة الطالب خلف الفريم */
    #student-img {
      position: absolute;
      top: 28%;      /* نسبة النزول من الأعلى للمنطقة البيضاء */
      left: 17%;     /* نسبة الإزاحة من اليسار للمنطقة البيضاء */
      width: 66%;    /* عرض المنطقة البيضاء */
      height: 58%;   /* طول المنطقة البيضاء */
      object-fit: cover;
      z-index: 1;
    }

    /* الفريم فوق الصورة */
    .frame-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      background-image: url('frame.jpg'); /* اسم الملف الذي طلبته */
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }

    .actions { display: flex; gap: 15px; justify-content: center; width: 90%; margin: 0 auto; }
    .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
  </style>
</head>
<body>

  <header id="main-header">
    <h1>دفعة 2026</h1>
    <p>صمم لوحتك التذكارية الملكية</p>
  </header>

  <div class="input-container" id="input-area">
    <div class="glass-card">
      <span class="label-text">الاسم بالكامل</span>
      <input type="text" id="name-field" placeholder="أدخل اسمك ليتم تسجيله...">
      
      <span class="label-text">الصورة الشخصية</span>
      <label class="btn-gold" style="display: block; text-align: center; margin-bottom: 25px;">
        اختر صورتك 📸
        <input type="file" id="upload-field" hidden accept="image/*" onchange="handleImage(this)">
      </label>
      
      <button class="btn-gold" onclick="generateCard()">استعراض اللوحة ✨</button>
    </div>
  </div>

  <section id="celebration-section">
    <div id="capture-zone" class="frame-container">
      <img id="student-img" src="" alt="Graduate">
      <div class="frame-img"></div>
    </div>

    <div class="actions">
      <button class="btn-gold" id="download-btn" onclick="saveToDevice()">حفظ الصورة بجودة عالية 📥</button>
      <button class="btn-gold btn-outline" onclick="location.reload()">تعديل</button>
    </div>
  </section>

  <script>
    let rawImageData = null;

    function handleImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          rawImageData = e.target.result;
          alert("تم رفع الصورة بنجاح! اضغط على استعراض.");
        }
        reader.readAsDataURL(input.files[0]);
      }
    }

    function generateCard() {
      const name = document.getElementById('name-field').value;
      if (!name || !rawImageData) {
        alert("يرجى كتابة الاسم ورفع الصورة أولاً.");
        return;
      }

      document.getElementById('student-img').src = rawImageData;
      document.getElementById('main-header').style.display = 'none';
      document.getElementById('input-area').style.display = 'none';
      document.getElementById('celebration-section').style.display = 'block';
    }

    async function saveToDevice() {
      const btn = document.getElementById('download-btn');
      btn.innerText = "جاري المعالجة...";
      
      // نستخدم html2canvas لالتقاط الفريم مع الصورة
      const canvas = await html2canvas(document.getElementById('capture-zone'), {
        scale: 4, // جودة 4K
        useCORS: true,
        allowTaint: true
      });

      const link = document.createElement('a');
      link.download = `Graduation-2026-Card.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.innerText = "حفظ الصورة بجودة عالية 📥";
    }
  </script>
</body>
</html>
