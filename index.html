<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة تخرج دفعة 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --gold: #c9a84c;
            --dark: #050508;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { padding: 50px 20px; text-align: center; }
        header h1 { font-family: 'Amiri', serif; font-size: 3rem; color: var(--gold); }

        /* ── منطقة الإدخال ── */
        .setup-container {
            width: 90%;
            max-width: 450px;
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
        }

        .upload-btn {
            display: block;
            background: var(--gold);
            color: black;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .generate-btn {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 15px 30px;
            border-radius: 50px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .generate-btn:hover { background: var(--gold); color: black; }

        /* ── منطقة الكارت (الفريم والصورة) ── */
        #celebration-area { display: none; margin-top: 30px; text-align: center; }

        .card-wrapper {
            position: relative;
            width: 350px;  /* يمكنك تكبير العرض هنا */
            height: 350px; /* يجب أن يكون مربعاً مثل الفريم */
            margin: 0 auto 30px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* صورة المستخدم (توضع بالخلف) */
        #user-photo {
            position: absolute;
            top: 28%;      /* ضبط مكان المربع الأبيض */
            left: 17.5%;   /* ضبط مكان المربع الأبيض */
            width: 65%;    /* عرض الصورة داخل المربع */
            height: 59%;   /* طول الصورة داخل المربع */
            object-fit: cover;
            z-index: 1;
        }

        /* الفريم (يوضع بالأمام) */
        .frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('frame.jpg'); /* اسم الملف المرفوع */
            background-size: 100% 100%;
            z-index: 2;
            pointer-events: none; /* للسماح بالتفاعل تحت الفريم */
        }

        .download-btn {
            background: #27ae60;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>دفعة 2026</h1>
        <p>قم بإنشاء كارت التخرج الخاص بك</p>
    </header>

    <div class="setup-container" id="input-box">
        <input type="text" id="name-input" placeholder="اكتب اسمك الكامل هنا">
        
        <label class="upload-btn">
            ارفع صورتك الشخصية 📷
            <input type="file" id="file-input" hidden accept="image/*">
        </label>
        
        <button class="generate-btn" onclick="createCard()">عرض كارت التخرج ✨</button>
    </div>

    <div id="celebration-area">
        <div id="capture-box" class="card-wrapper">
            <img id="user-photo" src="" alt="Student Photo">
            <div class="frame-overlay"></div>
        </div>
        
        <button class="download-btn" onclick="downloadImage()">تحميل الصورة بجودة عالية 📥</button>
        <p style="margin-top: 20px; opacity: 0.5; cursor: pointer;" onclick="location.reload()">إعادة المحاولة</p>
    </div>

    <script>
        let imageData = null;

        // معالجة رفع الصورة
        document.getElementById('file-input').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                imageData = event.target.result;
                alert("تم تجهيز الصورة!");
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // إنشاء الكارت
        function createCard() {
            const name = document.getElementById('name-input').value;
            if (!name || !imageData) {
                alert("من فضلك أدخل الاسم وارفع الصورة أولاً");
                return;
            }

            document.getElementById('user-photo').src = imageData;
            document.getElementById('input-box').style.display = 'none';
            document.getElementById('celebration-area').style.display = 'block';
        }

        // تحميل الصورة
        async function downloadImage() {
            const btn = event.target;
            btn.innerText = "جاري المعالجة...";
            
            const canvas = await html2canvas(document.getElementById('capture-box'), {
                scale: 3, // جودة عالية
                useCORS: true
            });

            const link = document.createElement('a');
            link.download = 'Graduation_2026.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            btn.innerText = "تحميل الصورة بجودة عالية 📥";
        }
    </script>
</body>
</html>
